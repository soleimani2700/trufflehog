name: TruffleHog Scan for sk_live_KEY

on:
  workflow_dispatch: # اجرای دستی
  push:
    branches:
      - main

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run TruffleHog
        run: |
          python trufflehog.py --regex --entropy=False --rules '{"sk_live_KEY": "sk_live_[a-zA-Z0-9]{24}"}' https://github.com/<TARGET_REPO>
