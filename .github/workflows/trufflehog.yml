# .github/workflows/stripe-scan.yml
name: 🔍 Stripe Live Key Scanner

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # هر روز صبح ۶

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

      - name: 🔎 Deep Scan for sk_live_ keys
        id: scan
        run: |
          echo "::group::Running TruffleHog..."
          
          # اسکن کامل + فقط Stripe + verified
          trufflehog git file://. \
            --only-verified \
            --json 2>/dev/null | \
            jq -c 'select(.Raw | contains("sk_live_"))' > findings.jsonl || true
          
          echo "::endgroup::"
          
          # شمارش
          COUNT=$(wc -l < findings.jsonl | tr -d ' ')
          echo "found=$COUNT" >> $GITHUB_OUTPUT
          
          if [ "$COUNT" -gt 0 ]; then
            echo "🚨 **$COUNT STRIPE LIVE KEY(S) DETECTED**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Commit | Author | Key Preview |" >> $GITHUB_STEP_SUMMARY
            echo "|------|--------|--------|-------------|" >> $GITHUB_STEP_SUMMARY
            
            while IFS= read -r line; do
              FILE=$(echo "$line" | jq -r '.SourceMetadata.Data.Git.file // "unknown"')
              COMMIT=$(echo "$line" | jq -r '.SourceMetadata.Data.Git.commit[0:7] // "unknown"')
              AUTHOR=$(echo "$line" | jq -r '.SourceMetadata.Data.Git.author // "unknown"')
              RAW=$(echo "$line" | jq -r '.Raw // ""')
              
              # Mask کردن کلید
              PREVIEW=$(echo "$RAW" | sed 's/sk_live_\(.\{8\}\).*/sk_live_\1••••••••/')
              
              echo "| \`$FILE\` | \`$COMMIT\` | $AUTHOR | \`$PREVIEW\` |" >> $GITHUB_STEP_SUMMARY
              
            done < findings.jsonl
            
            exit 1
          else
            echo "✅ **No Stripe live keys found**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📊 Summary
        if: always()
        run: |
          echo "Scan completed. Check Summary tab for details."
