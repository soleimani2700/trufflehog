# .github/workflows/stripe-scan.yml
name: 🔍 Stripe Live Key Scanner

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
          trufflehog --version

      - name: Scan for sk_live keys
        id: scan
        run: |
          echo "🔍 Starting scan..."
          
          # اسکن بدون فیلتر اولیه - همه رو بگیر
          trufflehog git file://. --json > all_findings.json 2>&1 || true
          
          echo "=== RAW OUTPUT ==="
          cat all_findings.json
          
          # فیلتر Stripe live
          if grep -q "sk_live" all_findings.json 2>/dev/null; then
            echo "🚨 FOUND sk_live!"
            grep "sk_live" all_findings.json | jq -s '.' > stripe_keys.json
            
            # نمایش نتایج
            jq '.[] | {
              "File": .SourceMetadata.Data.Git.file,
              "Commit": .SourceMetadata.Data.Git.commit[0:7],
              "Key Preview": (.Raw | split("sk_live_")[1] | "sk_live_" + .[0:8] + "..."),
              "Verified": .Verified
            }' stripe_keys.json
            
            echo "found=true" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ No sk_live keys found"
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Report Summary
        if: always()
        run: |
          if [ "${{ steps.scan.outputs.found }}" == "true" ]; then
            echo "🚨 **ALERT: Stripe Live Keys Detected!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Clean - No Stripe live keys found**" >> $GITHUB_STEP_SUMMARY
          fi
