# .github/workflows/scan-stripe.yml
name: Scan for Stripe Live Keys

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan for Stripe Keys
        run: |
          echo "🔍 Scanning for Stripe live keys..."
          
          trufflehog git file://. --json --only-verified 2>/dev/null | \
          jq -r 'select(.DetectorName == "Stripe" and (.Raw | contains("sk_live_")))' | \
          jq -s '.' > stripe_live.json || true

      - name: Show Results
        run: |
          if [ -s stripe_live.json ] && [ "$(cat stripe_live.json)" != "[]" ]; then
            echo "🚨 STRIPE LIVE KEYS FOUND:"
            cat stripe_live.json | jq '.[] | {
              key: (.Raw | split("sk_live_")[1] | "sk_live_" + .[0:12] + "••••••••"),
              file: .SourceMetadata.Data.Git.file,
              commit: .SourceMetadata.Data.Git.commit[0:7],
              author: .SourceMetadata.Data.Git.author,
              date: .SourceMetadata.Data.Git.date
            }'
            exit 1  # Fail the job
          else
            echo "✅ No Stripe live keys found"
          fi
